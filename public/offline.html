<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - TibhukeBus</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      color: #1f2937;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      max-width: 400px;
      width: 100%;
    }
    h1 {
      color: #2563eb;
      margin-top: 0;
    }
    p {
      color: #4b5563;
      line-height: 1.5;
    }
    .btn {
      background-color: #2563eb;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
      font-weight: 600;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📶❌</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry, TibhukeBus will be back as soon as you're online.</p>
    <a href="javascript:window.location.reload();" class="btn">Try Again</a>
  </div>
</body>
</html>
